<!DOCTYPE html>
<html>
<head>
<title>Investment Withdrawal Request</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#1e90ff,#00c9a7);
padding:20px;
}

.form-box{
background:white;
padding:25px;
max-width:420px;
margin:auto;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

button:hover{
background:#218838;
}

.ref{
text-align:center;
margin-top:15px;
}

.ref b{
color:red;
font-size:17px;
}

</style>

</head>

<body>

<div class="form-box">

<h2>Investment Withdrawal Request</h2>

<form>

<label>User Name</label>
<input type="text" required>

<label>User ID</label>
<input type="text" required>

<label>Withdraw Amount</label>
<input type="number" required>

<label>Withdraw Method</label>
<select>
<option>bKash</option>
<option>Nagad</option>
<option>Bank</option>
</select>

<label>bKash / Nagad Number</label>
<input type="text" required>

<button type="submit">Submit Withdrawal</button>

</form>

<div class="ref">
Refered By <b>ASRAF MAHDI</b>
</div>

</div>

</body>
</html>
