<!DOCTYPE html>
<html>
<head>
<title>Investment User Submit</title>
<style>
body{
font-family: Arial;
background:#f2f2f2;
padding:20px;
}

.form-box{
background:white;
padding:20px;
max-width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
}

button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
}
</style>
</head>

<body>

<div class="form-box">

<h2>User Investment Submit</h2>

<form action="#" method="post" enctype="multipart/form-data">

<label>User Name</label>
<input type="text" name="username" required>

<label>User ID</label>
<input type="text" name="userid" required>

<label>Payment Amount</label>
<input type="number" name="amount" required>

<label>Withdraw System</label>
<select name="withdraw">
<option>bKash</option>
<option>Nagad</option>
<option>Bank</option>
</select>

<label>Submit File</label>
<input type="file" name="file">

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
